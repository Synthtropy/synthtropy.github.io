<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthtropy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <div class="page__content">
            <div class="hero">
                <div class="container">
                    <img src="img/icon.png" alt="Skene" class="hero__app-icon">
                    <img src="img/skene-logo.png" alt="Synthtropy" class="hero__wordmark">
                    <p class="hero__company-tagline">
                        Music tools for live performance and creative expression.
                    </p>

                    <a href="skene/" class="product-card">
                        <div class="product-card__body">
                            <div class="product-card__name">Skene</div>
                            <div class="product-card__desc">DAW for iOS and macOS &mdash; node-based instruments, MPE, AUv3, and live performance</div>
                        </div>
                        <span class="product-card__arrow">&#8594;</span>
                    </a>
                </div>
            </div>
        </div>

        <footer>
            <div class="container">
                <div class="footer-inner">
                    <span class="footer__copy">&copy; 2026 Synthtropy</span>
                    <a href="mailto:contact@synthtropy.com" class="footer__contact">contact@synthtropy.com</a>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
